services:
  web:
    build: .
    restart: always
    environment:
      DJANGO_SETTINGS_MODULE: src.settings
    volumes:
      - static_files:/app/src/staticfiles
      - media_files:/app/src/media
    ports:
      - "8003:8000"
    depends_on:
      db:
      condition: service_healthy

  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  volumes:
    postgres_data:
    static_files:
    media_files: